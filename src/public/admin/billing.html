<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>קליניקה — חיובים</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .month-nav { display:flex; align-items:center; gap:16px; }
    .month-nav button { background:#edf2f7; border:none; border-radius:6px; padding:6px 12px; cursor:pointer; font-size:18px; }
    .month-nav span { font-size:16px; font-weight:700; min-width:120px; text-align:center; }
    tfoot td { font-weight:700; background:#f7fafc; }
    .rate-chip {
      display:inline-block;
      background:#ebf8ff;
      color:#2a69ac;
      border-radius:8px;
      padding:2px 8px;
      font-size:12px;
      font-weight:600;
    }
    .slot-chip {
      display:inline-block;
      background:#f0fff4;
      color:#276749;
      border-radius:8px;
      padding:2px 8px;
      font-size:12px;
      font-weight:600;
    }
    .billing-breakdown {
      background:#f7fafc;
      border-radius:8px;
      padding:12px 16px;
      margin-bottom:16px;
      font-size:13px;
      line-height:2;
    }
    .billing-breakdown .row { display:flex; justify-content:space-between; }
    .billing-breakdown .row.total { font-weight:700; font-size:14px; border-top:1px solid #e2e8f0; margin-top:4px; padding-top:4px; }
    .billing-breakdown .row.credit { color:#276749; }
    .billing-breakdown .row.discount { color:#744210; }
    .adj-row { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid #f0f4f8; font-size:13px; }
  </style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-logo"><span>🏥</span>קליניקה</div>
    <nav>
      <a href="/admin/index.html"><span class="icon">📊</span>לוח מחוונים</a>
      <a href="/admin/schedule.html"><span class="icon">📅</span>לוח זמנים</a>
      <a href="/admin/therapists.html"><span class="icon">👥</span>מטפלים</a>
      <a href="/admin/billing.html" class="active"><span class="icon">💰</span>חיובים</a>
      <a href="/admin/settings.html"><span class="icon">⚙️</span>הגדרות</a>
    </nav>
    <div class="sidebar-user">
      <div class="name" id="userName">...</div>
      <div class="role">מנהל</div>
      <form action="/auth/logout" method="post">
        <button class="btn-logout" type="submit">יציאה</button>
      </form>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <h2>חיובים חודשיים</h2>
      <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <span id="monthLabel"></span>
        <button onclick="changeMonth(1)">›</button>
      </div>
    </div>

    <div class="content">
      <!-- מדרגות -->
      <div class="card" style="margin-bottom:20px;">
        <h3 style="font-size:14px;margin-bottom:12px;color:#718096;">מדרגות חיוב</h3>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <span class="rate-chip">עד 4 ש' — 50 ₪</span>
          <span class="rate-chip">4–16 ש' — 47 ₪</span>
          <span class="rate-chip">16–24 ש' — 37 ₪</span>
          <span class="rate-chip">24–32 ש' — 32 ₪</span>
          <span class="rate-chip">מעל 32 ש' — 27 ₪</span>
        </div>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>מטפל</th>
              <th>ססיה קבועה</th>
              <th>שעות נוספות</th>
              <th>זיכויים</th>
              <th>סה"כ לחיוב</th>
              <th>פרוט</th>
            </tr></thead>
            <tbody id="billingTable">
              <tr><td colspan="6" class="loading">טוען...</td></tr>
            </tbody>
            <tfoot>
              <tr>
                <td>סה"כ</td>
                <td></td>
                <td></td>
                <td></td>
                <td id="footTotal">—</td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal פרוט -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" style="width:640px;max-width:98vw;">
    <button class="modal-close" onclick="closeDetail()">✕</button>
    <h3 id="detailTitle" style="margin-bottom:4px;"></h3>
    <p id="detailSub" style="font-size:13px;color:#718096;margin-bottom:16px;"></p>

    <!-- פירוט חיוב -->
    <div id="billingBreakdown" class="billing-breakdown" style="display:none;"></div>

    <!-- זיכויים והנחות -->
    <div id="adjustmentsSection" style="margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <strong style="font-size:13px;">זיכויים והנחות</strong>
        <button class="btn btn-ghost btn-sm" onclick="toggleAdjForm()">+ הוסף</button>
      </div>
      <div id="adjList"></div>
      <div id="adjForm" style="display:none;background:#f7fafc;border-radius:8px;padding:12px;margin-top:8px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
          <div class="form-group" style="margin:0;">
            <label style="font-size:12px;">סוג</label>
            <select class="form-control" id="adjType" style="font-size:13px;" onchange="onAdjTypeChange()">
              <option value="credit_hours">זיכוי שעות</option>
              <option value="discount_amount">הנחה בסכום (₪)</option>
            </select>
          </div>
          <div class="form-group" style="margin:0;">
            <label style="font-size:12px;" id="adjValueLabel">שעות לזיכוי</label>
            <input type="number" class="form-control" id="adjValue" style="font-size:13px;" min="0" step="0.25" placeholder="0">
          </div>
        </div>
        <div class="form-group" style="margin-bottom:8px;">
          <label style="font-size:12px;">הערה (אופציונלי)</label>
          <input type="text" class="form-control" id="adjNote" style="font-size:13px;" placeholder="סיבה">
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button class="btn btn-ghost btn-sm" onclick="toggleAdjForm()">ביטול</button>
          <button class="btn btn-primary btn-sm" onclick="saveAdjustment()">שמור</button>
        </div>
      </div>
    </div>

    <!-- טבלת פגישות -->
    <div class="table-wrap">
      <table>
        <thead><tr><th>תאריך</th><th>שעות</th><th>סטטוס</th><th>ססיה</th><th></th></tr></thead>
        <tbody id="detailTable"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const MONTHS_HE = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  let currentDate = new Date();
  let currentYear = currentDate.getFullYear();
  let currentMonth = currentDate.getMonth() + 1;
  let detailTherapistId = null;
  let detailBillingData = null;

  fetch('/auth/me').then(r => r.json()).then(u => {
    document.getElementById('userName').textContent = u.name || u.email;
  });

  function updateLabel() {
    document.getElementById('monthLabel').textContent =
      MONTHS_HE[currentMonth - 1] + ' ' + currentYear;
  }

  function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    if (currentMonth < 1)  { currentMonth = 12; currentYear--; }
    updateLabel();
    loadBilling();
  }

  async function loadBilling() {
    const tbody = document.getElementById('billingTable');
    tbody.innerHTML = '<tr><td colspan="5" class="loading">טוען...</td></tr>';

    try {
      const res = await fetch(`/api/billing/summary/${currentYear}/${currentMonth}`);
      const data = await res.json();
      const therapists = data.therapists;

      if (!therapists.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#718096;padding:24px;">אין נתונים לחודש זה</td></tr>';
        document.getElementById('footHours').textContent = '—';
        document.getElementById('footTotal').textContent = '—';
        return;
      }

      tbody.innerHTML = therapists.map(t => {
        const slotCell = t.hasSlot
          ? `<span class="slot-chip">&#8362;${t.basePrice.toLocaleString('he-IL',{maximumFractionDigits:0})}</span>`
          : `<span style="color:#718096;font-size:13px;">&#8212;</span>`;
        const extraCost = t.hasSlot ? Math.max(0, t.totalAmount - t.basePrice) : 0;
        const extraCell = t.hasSlot && t.extraHours > 0
          ? `<span class="rate-chip">${t.extraHours}ש = &#8362;${extraCost.toLocaleString('he-IL',{maximumFractionDigits:0})}</span>`
          : t.hasSlot
          ? `<span style="color:#718096;font-size:13px;">&#8212;</span>`
          : `<span class="rate-chip">${t.totalHours}ש &times; &#8362;${t.ratePerHour}</span>`;
        const adjTotal = ((t.creditHours||0)*(t.extraRatePerHour||t.ratePerHour) + (t.discountAmount||0));
        const adjCell = adjTotal > 0
          ? `<span style="color:#276749;font-size:13px;">&#8722;&#8362;${adjTotal.toLocaleString('he-IL',{maximumFractionDigits:0})}</span>`
          : `<span style="color:#718096;font-size:13px;">&#8212;</span>`;
        return `<tr>
          <td><strong>${t.name}</strong><br><small style="color:#718096">${t.email}</small></td>
          <td>${slotCell}</td>
          <td>${extraCell}</td>
          <td>${adjCell}</td>
          <td><strong>&#8362;${t.totalAmount.toLocaleString('he-IL', {maximumFractionDigits:0})}</strong></td>
          <td><button class="btn btn-ghost btn-sm" onclick="showDetail(${t.id})">פרוט</button></td>
        </tr>`;
      }).join('');

      const totalAmount = therapists.reduce((s, t) => s + t.totalAmount, 0);
      document.getElementById('footTotal').textContent =
        '₪' + totalAmount.toLocaleString('he-IL', {maximumFractionDigits:0});
    } catch (e) {
      tbody.innerHTML = '<tr><td colspan="5" style="color:#e53e3e;text-align:center;">שגיאה בטעינה</td></tr>';
    }
  }

  async function showDetail(therapistId) {
    detailTherapistId = therapistId;
    document.getElementById('detailTitle').textContent = '...';
    document.getElementById('detailSub').textContent =
      MONTHS_HE[currentMonth - 1] + ' ' + currentYear;
    document.getElementById('detailTable').innerHTML = '<tr><td colspan="4" class="loading">טוען...</td></tr>';
    document.getElementById('billingBreakdown').style.display = 'none';
    document.getElementById('adjList').innerHTML = '';
    document.getElementById('adjForm').style.display = 'none';
    document.getElementById('detailModal').classList.add('open');

    try {
      const [billingRes, adjRes] = await Promise.all([
        fetch(`/api/billing/${therapistId}/${currentYear}/${currentMonth}`),
        fetch(`/api/billing/${therapistId}/${currentYear}/${currentMonth}/adjustments`),
      ]);
      detailBillingData = await billingRes.json();
      const adjData = await adjRes.json();
      document.getElementById('detailTitle').textContent = detailBillingData.therapist?.name || '';

      renderBreakdown(detailBillingData, adjData);
      renderAdjustments(adjData.adjustments || []);
      renderDetailTable(detailBillingData);
    } catch (e) {
      document.getElementById('detailTable').innerHTML =
        '<tr><td colspan="4" style="color:#e53e3e;">שגיאה</td></tr>';
    }
  }

  function renderBreakdown(data, adjData) {
    const box = document.getElementById('billingBreakdown');
    const adjs = adjData.adjustments || [];
    const creditHours = adjs.filter(a => a.type === 'credit_hours').reduce((s, a) => s + parseFloat(a.value), 0);
    const discountAmount = adjs.filter(a => a.type === 'discount_amount').reduce((s, a) => s + parseFloat(a.value), 0);

    let html = '';
    if (data.hasSlot) {
      const slotRateDisplay = data.slotRate ? `₪${data.slotRate} לחודש` : `${data.fixedSlotHours}ש &times; ₪${data.ratePerHour}`;
      html += `<div class="row"><span>ססיה קבועה (${data.fixedSlotHours} ש'  — ${slotRateDisplay})</span><span>₪${data.basePrice.toLocaleString('he-IL',{maximumFractionDigits:0})}</span></div>`;
      if (data.extraHours > 0) {
        const extraCost = Math.max(0, data.totalAmount - data.basePrice);
        html += `<div class="row"><span>שעות נוספות (${data.extraHours} ש' × ₪${data.extraRatePerHour})</span><span>₪${extraCost.toLocaleString('he-IL',{maximumFractionDigits:0})}</span></div>`;
      }
    } else {
      html += `<div class="row"><span>${data.totalHours} שעות × ₪${data.ratePerHour}/שעה</span><span>₪${data.totalAmount.toLocaleString('he-IL',{maximumFractionDigits:0})}</span></div>`;
    }

    if (creditHours > 0) {
      html += `<div class="row credit"><span>זיכוי שעות (${creditHours} ש')</span><span>−₪${(creditHours * data.ratePerHour).toLocaleString('he-IL',{maximumFractionDigits:0})}</span></div>`;
    }
    if (discountAmount > 0) {
      html += `<div class="row discount"><span>הנחה</span><span>−₪${discountAmount.toLocaleString('he-IL',{maximumFractionDigits:0})}</span></div>`;
    }

    const finalAmount = Math.max(0, data.totalAmount - (creditHours * data.ratePerHour) - discountAmount);
    html += `<div class="row total"><span>סה"כ לתשלום</span><span>₪${finalAmount.toLocaleString('he-IL',{maximumFractionDigits:0})}</span></div>`;

    box.innerHTML = html;
    box.style.display = 'block';
  }

  function renderAdjustments(adjs) {
    const container = document.getElementById('adjList');
    if (!adjs.length) {
      container.innerHTML = '<div style="color:#718096;font-size:13px;font-style:italic;margin-bottom:4px;">אין זיכויים/הנחות</div>';
      return;
    }
    container.innerHTML = adjs.map(a => `
      <div class="adj-row">
        <span style="font-weight:500;">${a.type === 'credit_hours' ? '⏱ זיכוי ' + a.value + ' ש\'' : '🏷 הנחה ₪' + a.value}</span>
        ${a.note ? '<span style="color:#718096;">' + a.note + '</span>' : ''}
        <button class="btn btn-danger btn-sm" style="margin-right:auto;padding:2px 8px;" onclick="deleteAdjustment(${a.id})">✕</button>
      </div>
    `).join('');
  }

  function renderDetailTable(data) {
    const tbody = document.getElementById('detailTable');
    if (!data.sessions.length) {
      tbody.innerHTML = '<tr><td colspan="5" style="color:#718096;text-align:center;">אין פגישות</td></tr>';
      return;
    }
    tbody.innerHTML = data.sessions.map(s => {
      const start = new Date(s.start_time);
      const dateStr = start.toLocaleDateString('he-IL', { weekday:'short', day:'numeric', month:'short' });
      const timeStr = start.toLocaleTimeString('he-IL', {hour:'2-digit',minute:'2-digit'});
      const hours = parseFloat(s.hours).toFixed(1);
      const badge = s.status === 'cancelled_charged'
        ? '<span class="badge badge-yellow">בוטל (מחויב)</span>'
        : '<span class="badge badge-green">מאושר</span>';
      const slotBadge = s.inSlot === null ? '—'
        : s.inSlot === true  ? '<span class="slot-chip">קבועה</span>'
        : s.inSlot === 'partial' ? '<span class="slot-chip" style="background:#fefcbf;color:#744210;">חלקית</span>'
        : '<span class="rate-chip">נוספת</span>';
      const waiveBtn = s.status === 'cancelled_charged'
        ? `<button class="btn btn-ghost btn-sm" onclick="waiveCharge(${s.id})">בטל חיוב</button>`
        : '';
      return `<tr>
        <td>${dateStr} ${timeStr}</td>
        <td>${hours} ש'</td>
        <td>${badge}</td>
        <td>${slotBadge}</td>
        <td>${waiveBtn}</td>
      </tr>`;
    }).join('');
  }

  async function waiveCharge(sessionId) {
    if (!confirm('לבטל את החיוב על פגישה זו?')) return;
    try {
      const res = await fetch(`/api/sessions/${sessionId}/waive`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
      });
      if (!res.ok) { alert('שגיאה בביטול החיוב'); return; }
      const [billingRes, adjRes] = await Promise.all([
        fetch(`/api/billing/${detailTherapistId}/${currentYear}/${currentMonth}`),
        fetch(`/api/billing/${detailTherapistId}/${currentYear}/${currentMonth}/adjustments`),
      ]);
      detailBillingData = await billingRes.json();
      const adjData = await adjRes.json();
      renderBreakdown(detailBillingData, adjData);
      renderDetailTable(detailBillingData);
    } catch (e) { alert('שגיאת רשת'); }
  }

  function toggleAdjForm() {
    const form = document.getElementById('adjForm');
    form.style.display = form.style.display === 'none' ? 'block' : 'none';
    if (form.style.display === 'block') {
      document.getElementById('adjValue').value = '';
      document.getElementById('adjNote').value = '';
    }
  }

  function onAdjTypeChange() {
    const type = document.getElementById('adjType').value;
    document.getElementById('adjValueLabel').textContent =
      type === 'credit_hours' ? 'שעות לזיכוי' : 'סכום הנחה (₪)';
  }

  async function saveAdjustment() {
    const type = document.getElementById('adjType').value;
    const value = parseFloat(document.getElementById('adjValue').value);
    const note = document.getElementById('adjNote').value.trim() || null;
    if (!value || value <= 0) return;

    try {
      const res = await fetch(`/api/billing/${detailTherapistId}/${currentYear}/${currentMonth}/adjustments`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type, value, note }),
      });
      if (!res.ok) return;
      toggleAdjForm();
      const [billingRes, adjRes] = await Promise.all([
        fetch(`/api/billing/${detailTherapistId}/${currentYear}/${currentMonth}`),
        fetch(`/api/billing/${detailTherapistId}/${currentYear}/${currentMonth}/adjustments`),
      ]);
      detailBillingData = await billingRes.json();
      const adjData = await adjRes.json();
      renderBreakdown(detailBillingData, adjData);
      renderAdjustments(adjData.adjustments || []);
    } catch (e) {}
  }

  async function deleteAdjustment(adjId) {
    try {
      await fetch(`/api/billing/adjustments/${adjId}`, { method: 'DELETE' });
      const [billingRes, adjRes] = await Promise.all([
        fetch(`/api/billing/${detailTherapistId}/${currentYear}/${currentMonth}`),
        fetch(`/api/billing/${detailTherapistId}/${currentYear}/${currentMonth}/adjustments`),
      ]);
      detailBillingData = await billingRes.json();
      const adjData = await adjRes.json();
      renderBreakdown(detailBillingData, adjData);
      renderAdjustments(adjData.adjustments || []);
    } catch (e) {}
  }

  function closeDetail() {
    document.getElementById('detailModal').classList.remove('open');
    detailTherapistId = null;
    detailBillingData = null;
    loadBilling();
  }

  updateLabel();
  loadBilling();
</script>
</body>
</html>
