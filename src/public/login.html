<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>קליניקת גולן — כניסה</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 48px 40px;
      text-align: center;
      width: 360px;
    }
    .logo { font-size: 48px; margin-bottom: 12px; }
    h1 { font-size: 22px; color: #1a202c; margin-bottom: 6px; }
    p { color: #718096; font-size: 14px; margin-bottom: 32px; }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px 20px;
      background: #fff;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      color: #2d3748;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .btn-google:hover {
      border-color: #4285f4;
      box-shadow: 0 2px 8px rgba(66,133,244,0.15);
    }
    .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }
    .btn-google.admin {
      margin-top: 10px;
      background: #f7fafc;
      color: #4a5568;
      font-size: 13px;
      padding: 10px 20px;
    }
    .separator { color: #cbd5e0; font-size: 12px; margin: 16px 0 6px; }
      background: #fff5f5;
      border: 1px solid #feb2b2;
      color: #c53030;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🏥</div>
    <h1>מערכת ניהול קליניקת גולן</h1>
    <p>כניסה למטפלים ולמנהל קליניקת גולן</p>
    <div class="error" id="errorMsg"></div>
    <a href="/auth/google" class="btn-google">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      כניסה עם Google
    </a>
    <div class="separator">כניסה למנהל קליניקת גולן</div>
    <a href="/auth/google/admin" class="btn-google admin">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      כניסה כמנהל (עם הרשאות קאלנדר)
    </a>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === 'not_registered') {
      const el = document.getElementById('errorMsg');
      el.textContent = 'כתובת האימייל שלך אינה רשומה במערכת. פנה למנהל קליניקת גולן.';
      el.classList.add('show');
    }
  </script>
</body>
</html>
